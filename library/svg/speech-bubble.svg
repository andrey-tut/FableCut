<svg xmlns="http://www.w3.org/2000/svg" width="500" height="360" viewBox="0 0 500 360">
  <!-- FableCut animated SVG · bubble pops in (~0.5s), then typing dots loop (chat / comment) -->
  <style>
    .bub { transform-box: fill-box; transform-origin: 250px 280px;
           animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .td { transform-box: fill-box; transform-origin: center;
          animation: type 1.2s ease-in-out infinite; }
    @keyframes type {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-12px); opacity: 1; }
    }
  </style>
  <g class="bub" style="--d:0s">
    <rect x="60" y="50" width="380" height="200" rx="40" fill="#ffffff"/>
    <path d="M180 245 L150 320 L250 245 Z" fill="#ffffff"/>
  </g>
  <g fill="#7b6cff">
    <circle class="td" style="--d:0.5s"  cx="185" cy="150" r="20"/>
    <circle class="td" style="--d:0.65s" cx="250" cy="150" r="20"/>
    <circle class="td" style="--d:0.8s"  cx="315" cy="150" r="20"/>
  </g>
</svg>
