<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- FableCut animated SVG · one-shot pop then repeated ring-swing (notification / subscribe) -->
  <style>
    .badge { transform-box: fill-box; transform-origin: center;
             animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    .bell { transform-box: fill-box; transform-origin: 250px 150px;
            animation: swing 2.2s ease-in-out infinite; }
    @keyframes swing {
      0%, 60%, 100% { transform: rotate(0deg); }
      68% { transform: rotate(16deg); }
      76% { transform: rotate(-13deg); }
      84% { transform: rotate(8deg); }
      92% { transform: rotate(-4deg); }
    }
    .clap { transform-box: fill-box; transform-origin: 250px 150px;
            animation: swing 2.2s ease-in-out infinite; }
    .dot { transform-box: fill-box; transform-origin: center;
           animation: ping 2.2s ease-out infinite; }
    @keyframes ping { 0%,60% { transform: scale(0); opacity: 0; } 70% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
  </style>
  <circle class="badge" style="--d:0s" cx="250" cy="250" r="180" fill="#ff5d73"/>
  <g class="bell" style="--d:0.5s" fill="#fff">
    <path d="M250 150 c-58 0 -84 44 -84 104 c0 56 -20 74 -30 90 l228 0 c-10 -16 -30 -34 -30 -90 c0 -60 -26 -104 -84 -104z"/>
    <circle cx="250" cy="146" r="16"/>
  </g>
  <path class="clap" style="--d:0.5s" d="M228 356 a22 22 0 0 0 44 0z" fill="#fff"/>
  <circle class="dot" style="--d:0.5s" cx="372" cy="128" r="26" fill="#ffd166"/>
</svg>
