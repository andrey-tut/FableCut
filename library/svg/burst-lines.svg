<svg xmlns="http://www.w3.org/2000/svg" width="700" height="700" viewBox="0 0 700 700">
  <!-- FableCut animated SVG · one-shot (~0.6s) · radial impact/speed lines. Align to a hard cut on V4. -->
  <style>
    .ln { stroke-dasharray: 170; stroke-dashoffset: 170;
          animation: shoot 0.55s cubic-bezier(.2,.8,.3,1) both; }
    @keyframes shoot {
      0%   { stroke-dashoffset: 170; opacity: 1; }
      65%  { stroke-dashoffset: 0;   opacity: 1; }
      100% { stroke-dashoffset: -60; opacity: 0; }
    }
    .flash { transform-box: fill-box; transform-origin: center;
             animation: fl 0.4s ease-out both; }
    @keyframes fl { 0% { transform: scale(0.2); opacity: 0.9; } 100% { transform: scale(1.3); opacity: 0; } }
  </style>
  <circle class="flash" style="--d:0s" cx="350" cy="350" r="150" fill="#fff6d8"/>
  <g stroke="#ffd166" stroke-width="16" stroke-linecap="round">
    <line class="ln" style="--d:0s" x1="350.0" y1="200.0" x2="350.0" y2="40.0"/>
    <line class="ln" style="--d:0.02s" x1="425.0" y1="220.1" x2="505.0" y2="81.5"/>
    <line class="ln" style="--d:0.04s" x1="479.9" y1="275.0" x2="618.5" y2="195.0"/>
    <line class="ln" style="--d:0.01s" x1="500.0" y1="350.0" x2="660.0" y2="350.0"/>
    <line class="ln" style="--d:0.03s" x1="479.9" y1="425.0" x2="618.5" y2="505.0"/>
    <line class="ln" style="--d:0.05s" x1="425.0" y1="479.9" x2="505.0" y2="618.5"/>
    <line class="ln" style="--d:0s" x1="350.0" y1="500.0" x2="350.0" y2="660.0"/>
    <line class="ln" style="--d:0.02s" x1="275.0" y1="479.9" x2="195.0" y2="618.5"/>
    <line class="ln" style="--d:0.04s" x1="220.1" y1="425.0" x2="81.5" y2="505.0"/>
    <line class="ln" style="--d:0.01s" x1="200.0" y1="350.0" x2="40.0" y2="350.0"/>
    <line class="ln" style="--d:0.03s" x1="220.1" y1="275.0" x2="81.5" y2="195.0"/>
    <line class="ln" style="--d:0.05s" x1="275.0" y1="220.1" x2="195.0" y2="81.5"/>
  </g>
</svg>
