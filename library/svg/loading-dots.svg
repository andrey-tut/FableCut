<svg xmlns="http://www.w3.org/2000/svg" width="300" height="120" viewBox="0 0 300 120">
  <!-- FableCut animated SVG · loops · three bouncing dots (loading / buffering) -->
  <style>
    .d { transform-box: fill-box; transform-origin: center;
         animation: bob 0.9s cubic-bezier(.4,0,.6,1) infinite; }
    @keyframes bob {
      0%, 80%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
      40%           { transform: translateY(-26px) scale(1.15); opacity: 1; }
    }
  </style>
  <g fill="#7b6cff">
    <circle class="d" style="--d:0s"    cx="80"  cy="60" r="18"/>
    <circle class="d" style="--d:0.15s" cx="150" cy="60" r="18"/>
    <circle class="d" style="--d:0.3s"  cx="220" cy="60" r="18"/>
  </g>
</svg>
